spring:
  main:
    allow-bean-definition-overriding: true
  flyway:
    locations: classpath:db/migration
  r2dbc:
    pool:
      initial-size: 10
      max-size: 20
      max-idle-time: 30m
      max-life-time: 60m
management:
  endpoints:
    web:
      base-path: /
graphql:
  packages: org.misarch.catalog
  federation:
    enabled: true
logging:
  level:
    io.r2dbc.pool: ${R2DBC_POOL_LOG_LEVEL:WARN}
    io.r2dbc.postgresql: ${R2DBC_POSTGRES_LOG_LEVEL:WARN}
    org.misarch.catalog.graphql: ${CATALOG_LOG_LEVEL:WARN}